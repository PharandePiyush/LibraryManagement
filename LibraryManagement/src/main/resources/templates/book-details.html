<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Details</title>
    <style>
        body { font-family: Arial; margin: 50px; }
        .container { width: 600px; margin: auto; padding: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="container">
		<h1>Book Details</h1>
        <h2 th:text="${book.title}">Book Title</h2>
        <p><strong>Author:</strong> <span th:text="${book.author}"></span></p>
        <p><strong>Description:</strong></p>
        <p th:text="${book.description}"></p>
        
        <a th:href="@{/books/update/{id}(id=${book.id})}">Edit Book</a> |
        <a href="/books/list">← Back to Book List</a>
    </div>
</body>
</html>
